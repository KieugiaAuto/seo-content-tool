<body>

  <script src="moTaTheoLoai.js"></script>
  <script>
    // Hàm loại bỏ dấu tiếng Việt để xử lý từ khóa
    function removeVietnameseTones(str) {
      return str
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/Đ/g, 'D');
    }

    const KG_TRACK_SITES = new Set(['kieugiaauto','phutunggiare','banphutung','phutungotokieugia']);

    function kgNormalizeText(s) {
      return (s || '')
        .toString()
        .replace(/<[^>]*>/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    // ===== NEAR DUPLICATE CHECK (Jaccard >= 80%) =====
    function kgTokenize(s) {
      const t = removeVietnameseTones(kgNormalizeText(s))
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!t) return [];
      return t.split(' ').filter(w => w.length >= 2);
    }

    function kgJaccardSim(a, b) {
      const A = new Set(kgTokenize(a));
      const B = new Set(kgTokenize(b));

      if (A.size === 0 || B.size === 0) return 0;

      let inter = 0;
      for (const x of A) if (B.has(x)) inter++;

      const uni = A.size + B.size - inter;
      return uni ? (inter / uni) : 0;
    }

    function kgKeyNormalize(s) {
      return removeVietnameseTones((s || '').toString())
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '')
        .trim();
    }

    function kgMakeProductKey(ten, ma) {
      const sku = kgKeyNormalize(ma);
      if (sku) return `sku__${sku}`;

      const name = kgKeyNormalize(ten);
      return `name__${name}`;
    }

// ==========================================
    // KẾT NỐI DATABASE GOOGLE SHEETS
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbxk0WE4cNx8-_6bwt4bv6ueLVRkgzhrfCPfX5VpkMmBe0fm41JMxOsAIdrLqFYxxQUhYA/exec";
    if (!window.kgGlobalStore) window.kgGlobalStore = {};

    // Tải lịch sử viết bài từ Sheets (ĐÃ TRANG BỊ CHỐNG CACHE)
    async function loadDataFromSheets() {
      try {
        // Thêm tham số thời gian để ép Google Sheets trả về dữ liệu mới nhất, không dùng đồ cũ
        const response = await fetch(API_URL + "?nocache=" + new Date().getTime());
        const data = await response.json();

        // Trộn dữ liệu thay vì xóa đè, đảm bảo không quên bài nhân viên vừa copy xong
        for (let pkey in data) {
          if (!window.kgGlobalStore[pkey]) window.kgGlobalStore[pkey] = {};
          for (let site in data[pkey]) {
            if (!window.kgGlobalStore[pkey][site]) {
              window.kgGlobalStore[pkey][site] = data[pkey][site];
            }
          }
        }
        console.log("✅ Đã tải dữ liệu đồng bộ MỚI NHẤT từ Google Sheets!");
      } catch (err) {
        console.error("❌ Lỗi tải dữ liệu mạng:", err);
      }
    }
    loadDataFromSheets(); // Chạy ngay khi bật tool

    function kgLoadDescStore() {
      return window.kgGlobalStore || {};
    }

    // Hàm lưu bài lên Google Sheets khi bấm "Sao chép" (Bản đủ Tên + Mã)
    function kgCommitDesc(productKey, website, descHtml) {
      // Lấy Tên và Mã nguyên bản từ các ô nhập liệu
      const productName = document.getElementById('ten').value.trim();
      const productCode = document.getElementById('ma').value.trim();

      if (!window.kgGlobalStore[productKey]) window.kgGlobalStore[productKey] = {};
      window.kgGlobalStore[productKey][website] = {
        desc: kgNormalizeText(descHtml),
        ts: Date.now()
      };

      fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          productKey: productKey,
          productName: productName, // Gửi tên
          productCode: productCode, // Gửi mã nguyên bản
          website: website,
          desc: kgNormalizeText(descHtml)
        })
      }).then(() => console.log("☁️ Đã lưu dữ liệu kèm Tên và Mã lên Sheets!"));
    }

    // Hàm check trùng dữ liệu (Thiết Quân Luật tuyệt đối)
    function kgIsDuplicateDesc(productKey, website, descHtml, threshold = 0.8) {
      let store = kgLoadDescStore();
      const used = store[productKey] || {};
      const curN = kgNormalizeText(descHtml);
      const now = Date.now();
      const KG_TTL_MS = 365 * 24 * 60 * 60 * 1000; // Lưu 1 năm để cấm đăng lại

      // 1. CHỐT CHẶN TRÊN CÙNG 1 WEB: Khóa cứng theo Mã Sản Phẩm
      if (used[website]) {
        return { 
          duplicate: true, 
          conflictSite: "CHÍNH WEB NÀY! (Mã sản phẩm này ĐÃ ĐƯỢC COPY trước đó. Cấm đăng lại!)", 
          similarity: 1, 
          exact: true 
        };
      }

      // 2. CHECK CHÉO VỚI CÁC WEB KHÁC
      for (const [site, saved] of Object.entries(used)) {
        if (!saved || site === website) continue;

        const savedDescN = (typeof saved === 'object' && saved.desc) ? saved.desc : String(saved);
        const ts = (typeof saved === 'object' && saved.ts) ? saved.ts : now; 

        if (now - ts > KG_TTL_MS) continue; 

        const isExact = (savedDescN === curN);
        const sim = kgJaccardSim(savedDescN, curN);

        if (isExact) {
          return { duplicate: true, conflictSite: site, similarity: 1, exact: true };
        }
        if (sim >= threshold) {
          return { duplicate: true, conflictSite: site, similarity: sim, exact: false };
        }
      }

      return { duplicate: false, similarity: 0, exact: false };
    }

    // ==========================================
    // CÁC HÀM XỬ LÝ NỘI DUNG
    // ==========================================
    function sinhMoTaTuDong(ten) {
      const regex = /(.*?)(ac|acura|aeolus|alfa_romeo|alpine|aston_martin|audi|bac|bahman|baic|bentley|bmw|bollinger|brilliance|bugatti|buick|byd|cadillac|callaway|carver|chery|chevrolet|chrysler|citroen|cupra|daihatsu|dodge|ds|ferrari|fiat|fisker|ford|geely|genesis|gmc|haval|hino|honda|hummer|hyundai|infiniti|isuzu|jaguar|jeep|kia|lamborghini|land_rover|lexus|lincoln|lotus|lucid|maserati|maybach|mazda|mclaren|mercedes_benz|mg|mini|mitsubishi|nissan|opel|pagani|peugeot|porsche|ram|renault|rivian|rolls_royce|saic|seat|skoda|smart|ssangyong|subaru|suzuki|tesla|toyota|vinfast|volkswagen|volvo|daewoo|mercedes)[\s-]+([a-zA-Z0-9\s.]+)(?:\s+(\d{4})(?:\D+(\d{4}))?)?$/i;
      const match = ten.match(regex);
      if (!match) {
        return `<p>Phụ tùng ô tô chất lượng cao, tương thích với nhiều dòng xe, đảm bảo hiệu suất và độ bền tối ưu.</p>`;
      }

      const tenPhuTung = match[1].trim();
      const hang = match[2].replace('_', '-').split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
      const dong = match[3].trim();
      const nam1 = match[4] || '';
      const nam2 = match[5] || '';
      const dateText = nam1 ? (nam2 ? ` từ ${nam1} đến ${nam2}` : ` đời ${nam1}`) : '';
      const website = document.getElementById('website').value;

      let gioiThieu = '';
      const tenPhuTungParts = tenPhuTung.split(' ');
      const tenPhuTungVariants = [];
      for (let i = tenPhuTungParts.length; i >= 2; i--) { 
        tenPhuTungVariants.push(tenPhuTungParts.slice(0, i).join(' ').trim());
      }

      const keywords = [];
      const fullKey = `${tenPhuTung} ${hang} ${dong}${nam1 ? ` ${nam1}` : ''}${nam2 ? ` ${nam2}` : ''}`.trim();
      keywords.push(fullKey);
      if (nam1) keywords.push(`${tenPhuTung} ${hang} ${dong} ${nam1}`.trim());
      keywords.push(`${tenPhuTung} ${hang} ${dong}`.trim());
      keywords.push(`${tenPhuTung} ${hang}`.trim());
      keywords.push(tenPhuTung);
      keywords.push(...tenPhuTungVariants);

      try {
        const tuKhoaList = Object.keys(moTaTheoLoai).sort((a, b) => b.length - a.length);
        for (const keyword of keywords) {
          const keywordNoTones = removeVietnameseTones(keyword).toLowerCase().replace(/\s+/g, ' ').trim();
          for (const tuKhoa of tuKhoaList) {
            const tuKhoaNoTones = removeVietnameseTones(tuKhoa).toLowerCase().replace(/\s+/g, ' ').trim();
            if (keywordNoTones === tuKhoaNoTones) {
              const dsMoTa = moTaTheoLoai[tuKhoa];
              gioiThieu = dsMoTa[Math.floor(Math.random() * dsMoTa.length)];
              break;
            }
          }
          if (gioiThieu) break; 
        }
      } catch (err) {
        console.error('Lỗi khi truy cập moTaTheoLoai:', err);
      }

      if (!gioiThieu) {
        gioiThieu = 'Phụ tùng ô tô chất lượng cao, tương thích với nhiều dòng xe, đảm bảo hiệu suất và độ bền tối ưu.';
      }

      const maInput = (document.getElementById('ma')?.value || '').trim();
      const productKey = kgMakeProductKey(ten, maInput);
      const MAX_REROLL = 8;
      let lastMoTa = '';

      for (let attempt = 1; attempt <= MAX_REROLL; attempt++) {
        const moTaMau = {
          kieugiaauto: [
            `${gioiThieu} Sản phẩm phù hợp với ${hang} ${dong}${dateText}, dễ lắp đặt, được bảo hành đầy đủ.`,
            `${gioiThieu} Được thiết kế dành riêng cho ${hang} ${dong}${dateText}, đảm bảo chính hãng với giá cạnh tranh.`
          ],
          phutungotokieugia: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, được nhiều gara tin dùng.`,
            `${gioiThieu} Hỗ trợ kỹ thuật tận tâm, phù hợp hoàn hảo cho ${hang} ${dong}${dateText}.`
          ],
          banphutung: [
            `${gioiThieu} Phù hợp với ${hang} ${dong}${dateText}, luôn có sẵn và giao hàng toàn quốc.`,
            `${gioiThieu} Góp phần bảo vệ và nâng cao hiệu suất cho ${hang} ${dong}${dateText}.`
          ],
          phutunggiare: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, giá tiết kiệm, bảo hành đầy đủ.`,
            `${gioiThieu} Lựa chọn chính hãng, tiết kiệm chi phí cho ${hang} ${dong}${dateText}.`
          ],
          shopee: [
            `${gioiThieu} Phù hợp với ${hang} ${dong}${dateText}, giá ưu đãi trên Shopee.`,
            `${gioiThieu} Sản phẩm chất lượng cao cho ${hang} ${dong}${dateText}, giao hàng nhanh chóng.`
          ],
          shopee2: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, phụ tùng chất lượng cao.`,
            `${gioiThieu} Phù hợp cho ${hang} ${dong}${dateText}, lắp đặt dễ dàng.`
          ],
        };

        const mau = moTaMau[website];
        if (!mau || !gioiThieu) return '';

        let moTa = `<p>${mau[Math.floor(Math.random() * mau.length)]}</p>`;

        if (website === 'kieugiaauto' || website === 'phutungotokieugia') {
          const linkTrangChu = website === 'kieugiaauto' ? 'https://kieugiaauto.vn' : 'https://phutungotokieugia.vn';
          const regex = new RegExp(`\\b${hang}\\b(?![^<]*>)`, 'i');
          moTa = moTa.replace(regex, `<a href="${linkTrangChu}/${hang.toLowerCase().replace(' ', '-')}" target="_blank">${hang}</a>`);
        }

        lastMoTa = moTa;

        if (KG_TRACK_SITES.has(website)) {
          const dup = kgIsDuplicateDesc(productKey, website, moTa);
          if (dup.duplicate) continue;
        }
        return moTa;
      }
      return lastMoTa;
    }

    // =========================
    // HÀM SAO CHÉP VÀ GHI DATABASE
    // =========================
    function saoChepNoiDung() {
      const copyButton = document.getElementById('copyButton');

      const g = kgGuardCopy(copyButton, { silent: false });
      if (g.guarded) return;

      const website = copyButton.dataset.website || document.getElementById('website').value;
      let content = copyButton.dataset.content;

      if (!content) {
        alert('Chưa có nội dung để sao chép! Vui lòng tạo nội dung trước.');
        return;
      }

      if (website === 'banphutung' || website === 'phutungotokieugia' || website === 'kieugiaauto' || website === 'phutunggiare') {
        const parser = new DOMParser();
        const doc = parser.parseFromString(content, 'text/html');

        const removeEmptyNodes = (node) => {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (['P', 'DIV', 'UL', 'LI'].includes(node.tagName)
              && !node.textContent.trim()
              && !node.querySelector('a, strong, em')) {
              node.remove();
              return;
            }
            Array.from(node.childNodes).forEach(removeEmptyNodes);
          }
        };
        removeEmptyNodes(doc.body);
        content = doc.body.innerHTML.trim().replace(/\n\s*\n/g, '\n').replace(/\s+$/gm, '');
      } else {
        content = content.trim().replace(/\n\s*\n/g, '\n').replace(/\s+$/gm, '');
      }

      const commitAfterCopy = () => {
        if (KG_TRACK_SITES.has(website)) {
          const pkey = copyButton.dataset.productKey;
          const desc = copyButton.dataset.descHtml;
          if (pkey && desc) kgCommitDesc(pkey, website, desc); // Gọi hàm lưu lên Google Sheets
        }
        alert('Đã sao chép nội dung thành công!');
        copyButton.style.display = 'none';
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(content)
          .then(commitAfterCopy)
          .catch(err => {
            console.error('Lỗi sao chép clipboard:', err);
            if (fallbackCopy(content)) commitAfterCopy();
          });
      } else {
        if (fallbackCopy(content)) commitAfterCopy();
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        const ok = document.execCommand('copy');
        if (!ok) alert('Không thể sao chép! Vui lòng thử lại hoặc sao chép thủ công.');
        return ok;
      } catch (err) {
        console.error('Lỗi sao chép dự phòng:', err);
        alert('Không thể sao chép! Vui lòng thử lại hoặc sao chép thủ công.');
        return false;
      } finally {
        document.body.removeChild(textArea);
      }
    }
</script>
