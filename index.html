<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiều Gia Content Pro</title>
  <style>
    /* =========================================
       GIAO DIỆN MỚI CHUYÊN NGHIỆP CHO KIỀU GIA AUTO
       ========================================= */
       body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px 20px;
      background-color: #f0f2f5; /* Màu nền xám nhạt hiện đại */
    }
    .container {
      max-width: 850px; /* Thu gọn lại cho form cân đối, dễ nhìn */
      margin: 0 auto;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px; /* Bo góc to mềm mại */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Bóng đổ 3D mượt mà */
      border: 1px solid #eaeaea;
    }
    h1 {
      text-align: center;
      color: #1a202c;
      font-size: 28px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 2px solid #edf2f7; /* Đường gạch dưới tiêu đề */
    }
    .form-group {
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 8px;
      font-size: 15px;
    }
    input, select {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 15px;
      color: #2d3748;
      background-color: #f8fafc;
      transition: all 0.3s ease; /* Hiệu ứng chuyển động mượt */
    }
    /* Hiệu ứng khi click vào ô nhập liệu */
    input:focus, select:focus {
      outline: none;
      border-color: #3182ce;
      background-color: #ffffff;
      box-shadow: 0 0 0 4px rgba(49, 130, 206, 0.15); /* Phát sáng viền xanh */
    }
    /* Chỉnh giao diện chung cho Nút bấm */
    button {
      background-color: #10b981; /* Xanh lá hiện đại */
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
    }
    button:hover {
      background-color: #059669;
      transform: translateY(-2px); /* Hiệu ứng nổi lên khi di chuột */
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3);
    }
    button:active {
      transform: translateY(0); /* Hiệu ứng lún xuống khi click */
    }
    /* Chỉnh riêng nút copy cho khác biệt */
    #copyButton {
      background-color: #3b82f6; /* Xanh dương */
      box-shadow: 0 4px 6px rgba(59, 130, 246, 0.2);
    }
    #copyButton:hover {
      background-color: #2563eb;
      box-shadow: 0 6px 12px rgba(59, 130, 246, 0.3);
    }
    #copyButton:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .button-container {
      display: flex;
      gap: 15px;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }
    /* Khung hiển thị trước nội dung */
    #preview {
      padding: 25px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      background-color: #f8fafc;
      font-size: 15px;
      line-height: 1.6;
      color: #2d3748;
    }
    /* Đè CSS cho khung cảnh báo sửa bài (bỏ giao diện cũ) */
    #khung-sua-bai {
      background-color: #fffbeb !important;
      border: 1px solid #fde68a !important;
      border-radius: 10px !important;
      padding: 15px 20px !important;
    }
    #khung-sua-bai label {
      color: #b45309 !important;
      font-size: 15px;
    }
    /* Toast Notification (Thông báo góc màn hình) */
    #kg-toast {
      visibility: hidden;
      min-width: 280px;
      background-color: #28a745; 
      color: #fff;
      text-align: left;
      border-radius: 10px;
      padding: 16px 24px;
      position: fixed;
      z-index: 99999;
      right: 20px;
      bottom: 20px; 
      font-size: 15px;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55), visibility 0.4s;
    }
    #kg-toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 40px; 
    }
    /* Giao diện trên điện thoại */
    @media (max-width: 600px) {
      .button-container { flex-direction: column; }
      button { width: 100%; }
      .container { padding: 20px; border-radius: 12px; }
      body { padding: 15px; }
    }
    /* Giao diện thông báo góc màn hình */
    #kg-toast {
      visibility: hidden;
      min-width: 250px;
      background-color: #28a745; /* Màu xanh lá đồng bộ với nút */
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 15px 20px;
      position: fixed;
      z-index: 99999;
      right: 20px;
      bottom: 20px; /* Hiện ở góc dưới bên phải */
      font-size: 16px;
      font-weight: bold;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      opacity: 0;
      transition: opacity 0.4s, bottom 0.4s, visibility 0.4s;
    }

    #kg-toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 40px; /* Hiệu ứng trượt lên nhẹ cho mượt */
    }
    /* --- CSS CHIA 2 CỘT CHO FORM ĐỂ TIẾT KIỆM DIỆN TÍCH --- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* Chia form thành 2 cột bằng nhau */
      gap: 0 20px; /* Cột cách nhau 20px */
    }
    .full-width {
      grid-column: span 2; /* Riêng tên phụ tùng dài nên cho chiếm cả 2 cột */
    }
    
    /* Ép lại các khoảng trắng thừa để đẩy form lên cao */
    body { padding: 15px 20px; }
    .container { padding: 25px 35px; }
    h1 { 
      margin-bottom: 20px; 
      font-size: 24px; 
      padding-bottom: 10px; 
    }
    .form-group { margin-bottom: 15px; }
    
    /* Chỉnh lại khung cảnh báo cho vừa vặn ô lưới */
    .khung-canh-bao {
      background-color: #fffbeb !important;
      border: 1px solid #fde68a !important;
      border-radius: 10px !important;
      padding: 8px 15px !important;
      display: flex;
      align-items: center;
      margin-top: 28px; /* Đẩy xuống cho bằng hàng với chữ 'Chọn website' */
      height: fit-content;
    }
    
    /* Responsive trên điện thoại thì tự động dồn lại 1 cột */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .full-width { grid-column: span 1; }
      .khung-canh-bao { margin-top: 0; }
    }
  </style>

<body>
  <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 300px; text-align: center;">

      <input type="text" id="username" placeholder="Tên đăng nhập" onkeypress="if(event.key === 'Enter') xuLyDangNhap()" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">

  </div>

        <label for="xuatxu">Xuất xứ:</label>
        <input type="text" id="xuatxu" placeholder="Ví dụ: Nhật Bản">

    // Hàm tự động kiểm tra xem web nào đang được chọn để ẩn/hiện ô Sửa Bài
    function kiemTraWebSuaBai() {
      const website = document.getElementById('website').value;
      const khungSuaBai = document.getElementById('khung-sua-bai');
      const nutSuaBai = document.getElementById('modeUpdate');

      // Nếu chọn 1 trong 2 web Shopee
      if (website === 'shopee' || website === 'shopee2') {
        khungSuaBai.style.display = 'none'; // Giấu ô sửa bài đi
        nutSuaBai.checked = false;          // Tự động bỏ tích (phòng hờ nhân viên đang tích mà chuyển web)
      } else {
        // Nếu là 4 web chính
        khungSuaBai.style.display = 'block'; // Hiện lại bình thường
      }
    }

    // Chạy hàm này 1 lần ngay khi mở file để hệ thống set trạng thái chuẩn từ đầu
    document.addEventListener('DOMContentLoaded', kiemTraWebSuaBai);

    function hienThongBao(text, loai = 'success') {
      let toast = document.getElementById("kg-toast");
      // Tự động tạo thẻ div thông báo nếu chưa có
      if (!toast) {
        toast = document.createElement("div");
        toast.id = "kg-toast";
        document.body.appendChild(toast);
      }
      
      // Cho phép dùng thẻ <br> để xuống dòng
      toast.innerHTML = text;
      
      // Chọn màu nền tùy theo loại thông báo
      if (loai === 'error') {
        toast.style.backgroundColor = "#dc3545"; // Màu đỏ cho lỗi
        toast.style.color = "#fff";
      } else {
        toast.style.backgroundColor = "#28a745"; // Màu xanh cho thành công
        toast.style.color = "#fff";
      }

      toast.className = "show"; // Hiển thị thông báo
      
      // Tự động ẩn đi sau 3.5 giây (để lâu hơn chút cho nhân viên kịp đọc lỗi dài)
      setTimeout(function() {
        toast.className = toast.className.replace("show", "");
      }, 3500);
    }

    function kgFormatHang(str) {
      return (str || '').replace(/_/g, '-').split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
    }

    // ==========================================
    // HÀM TIỆN ÍCH
    // ==========================================
    function removeVietnameseTones(str) {
      return str
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/Đ/g, 'D');
    }

    function kgNormalizeText(s) {
      return (s || '')
        .toString()
        .replace(/<[^>]*>/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    // ===== NEAR DUPLICATE CHECK (Jaccard >= 80%) =====
    function kgTokenize(s) {
      const t = removeVietnameseTones(kgNormalizeText(s))
        .replace(/[^a-z0-9\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!t) return [];
      return t.split(' ').filter(w => w.length >= 2);
    }

    function kgJaccardSim(a, b) {
      const A = new Set(kgTokenize(a));
      const B = new Set(kgTokenize(b));

      if (A.size === 0 || B.size === 0) return 0;

      let inter = 0;
      for (const x of A) if (B.has(x)) inter++;

      const uni = A.size + B.size - inter;
      return uni ? (inter / uni) : 0;
    }

    function kgKeyNormalize(s) {
      return removeVietnameseTones((s || '').toString())
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '')
        .trim();
    }

    function kgMakeProductKey(ten, ma) {
      const sku = kgKeyNormalize(ma);
      if (sku) return `sku__${sku}`;

      const name = kgKeyNormalize(ten);
      return `name__${name}`;
    }

    // Hàm check trùng dữ liệu (Thiết Quân Luật tuyệt đối)
    function kgIsDuplicateDesc(productKey, website, descHtml, threshold = 0.8) {
      let store = kgLoadDescStore();
      const used = store[productKey] || {};
      const curN = kgNormalizeText(descHtml);
      const now = Date.now();

      // 1. CHỐT CHẶN TRÊN CÙNG 1 WEB: Khóa cứng theo Mã Sản Phẩm
      if (used[website]) {
        return { 
          duplicate: true, 
          conflictSite: "CHÍNH WEB NÀY! (Mã sản phẩm này ĐÃ ĐƯỢC COPY trước đó. Cấm đăng lại!)", 
          similarity: 1, 
          exact: true 
        };
      }

      // 2. CHECK CHÉO VỚI CÁC WEB KHÁC
      for (const [site, saved] of Object.entries(used)) {
        if (!saved || site === website) continue;

        const savedDescN = (typeof saved === 'object' && saved.desc) ? saved.desc : String(saved);
        const ts = (typeof saved === 'object' && saved.ts) ? saved.ts : now; 

        if (now - ts > KG_TTL_MS) continue; 

        const isExact = (savedDescN === curN);
        const sim = kgJaccardSim(savedDescN, curN);

        if (isExact) {
          return { duplicate: true, conflictSite: site, similarity: 1, exact: true };
        }
        if (sim >= threshold) {
          return { duplicate: true, conflictSite: site, similarity: sim, exact: false };
        }
      }

      return { duplicate: false, similarity: 0, exact: false };
    }

    // ==========================================
    // CÁC HÀM XỬ LÝ NỘI DUNG
    // ==========================================
    function sinhMoTaTuDong(ten) {
      const match = ten.match(CAR_BRAND_REGEX_FULL);
      if (!match) {
        return `<p>Phụ tùng ô tô chất lượng cao, tương thích với nhiều dòng xe, đảm bảo hiệu suất và độ bền tối ưu.</p>`;
      }

      const tenPhuTung = match[1].trim();
      const hang = kgFormatHang(match[2]);
      const dong = match[3].trim();
      const nam1 = match[4] || '';
      const nam2 = match[5] || '';
      const dateText = nam1 ? (nam2 ? ` từ ${nam1} đến ${nam2}` : ` đời ${nam1}`) : '';
      const website = document.getElementById('website').value;

      let gioiThieu = '';
      const tenPhuTungParts = tenPhuTung.split(' ');
      const tenPhuTungVariants = [];
      for (let i = tenPhuTungParts.length; i >= 2; i--) { 
        tenPhuTungVariants.push(tenPhuTungParts.slice(0, i).join(' ').trim());
      }

      const keywords = [];
      const fullKey = `${tenPhuTung} ${hang} ${dong}${nam1 ? ` ${nam1}` : ''}${nam2 ? ` ${nam2}` : ''}`.trim();
      keywords.push(fullKey);
      if (nam1) keywords.push(`${tenPhuTung} ${hang} ${dong} ${nam1}`.trim());
      keywords.push(`${tenPhuTung} ${hang} ${dong}`.trim());
      keywords.push(`${tenPhuTung} ${hang}`.trim());
      keywords.push(tenPhuTung);
      keywords.push(...tenPhuTungVariants);

      try {
        const tuKhoaList = Object.keys(moTaTheoLoai).sort((a, b) => b.length - a.length);
        for (const keyword of keywords) {
          const keywordNoTones = removeVietnameseTones(keyword).toLowerCase().replace(/\s+/g, ' ').trim();
          for (const tuKhoa of tuKhoaList) {
            const tuKhoaNoTones = removeVietnameseTones(tuKhoa).toLowerCase().replace(/\s+/g, ' ').trim();
            if (keywordNoTones === tuKhoaNoTones) {
              const dsMoTa = moTaTheoLoai[tuKhoa];
              gioiThieu = dsMoTa[Math.floor(Math.random() * dsMoTa.length)];
              break;
            }
          }
          if (gioiThieu) break; 
        }
      } catch (err) {
        console.error('Lỗi khi truy cập moTaTheoLoai:', err);
      }

      if (!gioiThieu) {
        gioiThieu = 'Phụ tùng ô tô chất lượng cao, tương thích với nhiều dòng xe, đảm bảo hiệu suất và độ bền tối ưu.';
      }

      const maInput = (document.getElementById('ma')?.value || '').trim();
      const productKey = kgMakeProductKey(ten, maInput);
      let lastMoTa = '';

      const moTaMau = {
        kieugiaauto: [
            `${gioiThieu} Sản phẩm phù hợp với ${hang} ${dong}${dateText}, dễ lắp đặt, được bảo hành đầy đủ.`,
            `${gioiThieu} Được thiết kế dành riêng cho ${hang} ${dong}${dateText}, đảm bảo chính hãng với giá cạnh tranh.`
          ],
          phutungotokieugia: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, được nhiều gara tin dùng.`,
            `${gioiThieu} Hỗ trợ kỹ thuật tận tâm, phù hợp hoàn hảo cho ${hang} ${dong}${dateText}.`
          ],
          banphutung: [
            `${gioiThieu} Phù hợp với ${hang} ${dong}${dateText}, luôn có sẵn và giao hàng toàn quốc.`,
            `${gioiThieu} Góp phần bảo vệ và nâng cao hiệu suất cho ${hang} ${dong}${dateText}.`
          ],
          phutunggiare: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, giá tiết kiệm, bảo hành đầy đủ.`,
            `${gioiThieu} Lựa chọn chính hãng, tiết kiệm chi phí cho ${hang} ${dong}${dateText}.`
          ],
          shopee: [
            `${gioiThieu} Phù hợp với ${hang} ${dong}${dateText}, giá ưu đãi trên Shopee.`,
            `${gioiThieu} Sản phẩm chất lượng cao cho ${hang} ${dong}${dateText}, giao hàng nhanh chóng.`
          ],
          shopee2: [
            `${gioiThieu} Tương thích với ${hang} ${dong}${dateText}, phụ tùng chất lượng cao.`,
            `${gioiThieu} Phù hợp cho ${hang} ${dong}${dateText}, lắp đặt dễ dàng.`
          ],
      };

      for (let attempt = 1; attempt <= MAX_REROLL; attempt++) {
        const mau = moTaMau[website];
        if (!mau || !gioiThieu) return '';

        let moTa = `<p>${mau[Math.floor(Math.random() * mau.length)]}</p>`;

        if (website === 'kieugiaauto' || website === 'phutungotokieugia') {
          const linkTrangChu = website === 'kieugiaauto' ? 'https://kieugiaauto.vn' : 'https://phutungotokieugia.vn';
          const hangRegex = new RegExp(`\\b${hang.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b(?![^<]*>)`, 'gi');
          moTa = moTa.replace(hangRegex, `<a href="${linkTrangChu}/${hang.toLowerCase().replace(/\s+/g, '-')}" target="_blank">${hang}</a>`);
        }

        lastMoTa = moTa;

        if (KG_TRACK_SITES.has(website)) {
          const dup = kgIsDuplicateDesc(productKey, website, moTa);
          if (dup.duplicate) continue;
        }
        return moTa;
      }
      return lastMoTa;

    function sinhDanhSachXe(ten, thuonghieu, isShopee = false) {
      if (!isShopee) return '';
      if (!ten || !thuonghieu) return `<h3>Phù hợp với các dòng xe:</h3><p>Tương thích với các dòng xe thuộc thương hiệu ${thuonghieu}</p>`;

      ten = ten.toLowerCase();
      const match = ten.match(CAR_BRAND_REGEX_WITH_YEARS);
      if (match) {
        const hang = kgFormatHang(match[1]);
        const dong = match[2] ? match[2].trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ') : '';
        const nam1 = match[3] || '';
        const nam2 = match[4] || '';

        if (nam1 && nam2) {
          const list = [];
          for (let y = parseInt(nam1); y <= parseInt(nam2); y++) { list.push(`${hang} ${dong} ${y}`); }
          return `<h3>Phù hợp với các dòng xe:</h3><p>${list.join(', ')}</p>`;
        } else if (nam1) {
          return `<h3>Phù hợp với các dòng xe:</h3><p>${hang} ${dong} ${nam1}</p>`;
        } else {
          return `<h3>Phù hợp với các dòng xe:</h3><p>${dong ? `${hang} ${dong}` : hang}</p>`;
        }
      }

      const hangOnly = Object.keys(HANG_XE_MAP).find(h => ten.includes(h));
      if (hangOnly) {
        const dongXeList = HANG_XE_MAP[hangOnly].slice().sort((a, b) => b.length - a.length);
        const dongXe = dongXeList.find(dong => {
          const pattern = dong.toLowerCase().replace(/\s+/g, '\\s+');
          const regex = new RegExp(pattern, 'i');
          return regex.test(ten);
        });

        const hangUc = kgFormatHang(hangOnly);

        if (dongXe) {
          const matchedDong = ten.match(new RegExp(dongXe.toLowerCase().replace(/\s+/g, '\\s*'), 'i'));
          const finalDong = matchedDong
            ? matchedDong[0].split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ')
            : dongXe;
          return `<h3>Phù hợp với các dòng xe:</h3><p>${hangUc} ${finalDong}</p>`;
        }
        return `<h3>Phù hợp với các dòng xe:</h3><p>${hangUc}</p>`;
      }
      return `<h3>Phù hợp với các dòng xe:</h3><p>Tương thích với các dòng xe thuộc thương hiệu ${thuonghieu}</p>`;
    }

    function kgGuardCopy(copyButton, opts = {}) {
      const { silent = false, threshold = 0.65 } = opts;
      const website = copyButton.dataset.website || document.getElementById('website').value;
      const ten = (document.getElementById('ten')?.value || '').trim();
      const ma  = (document.getElementById('ma')?.value || '').trim();
      const pkey = copyButton.dataset.productKey || kgMakeProductKey(ten, ma);

      const descRaw = copyButton.dataset.descHtml || '';
      if (!pkey || !descRaw) {
        copyButton.style.display = 'block';
        return { guarded: false };
      }

      if (!KG_TRACK_SITES.has(website)) {
        copyButton.style.display = 'block';
        return { guarded: false };
      }

      const dup = kgIsDuplicateDesc(pkey, website, descRaw, threshold);

      // Kiểm tra xem ô Sửa Bài có đang được tích không
      const isUpdate = document.getElementById('modeUpdate') && document.getElementById('modeUpdate').checked;

      // Chỉ ẩn nút copy khi: Bị trùng lặp VÀ Không bật chế độ sửa bài
      if (dup.duplicate && !isUpdate) {
        copyButton.style.display = 'none';
        if (!silent) {
          alert(`❌ Mô tả trùng/gần trùng (${Math.round(dup.similarity * 100)}%) với web "${dup.conflictSite}".\nKhông cho copy. Bấm "Tạo nội dung" lại để ra mô tả khác.`);
        }
        return { guarded: true, dup };
      }

      copyButton.style.display = 'block';
      return { guarded: false };
    }

    async function saoChepNoiDung() {
      const copyButton = document.getElementById('copyButton');

      const g = kgGuardCopy(copyButton, { silent: false });
      if (g.guarded) return;

      const website = copyButton.dataset.website || document.getElementById('website').value;
      const ten = (document.getElementById('ten')?.value || '').trim();
      const ma = (document.getElementById('ma')?.value || '').trim();

      // Đã xóa bỏ phần kiểm tra (await kgCheckProductOnWebsite) gây chậm ở đây
      // Vì đã được kiểm tra từ lúc ấn "Tạo nội dung" rồi

      let content = copyButton.dataset.content;

      if (!content) {
        alert('Chưa có nội dung để sao chép! Vui lòng tạo nội dung trước.');
        return;
      }

      if (KG_TRACK_SITES.has(website)) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(content, 'text/html');

        const removeEmptyNodes = (node) => {
          if (node.nodeType === Node.ELEMENT_NODE) {
            if (['P', 'DIV', 'UL', 'LI'].includes(node.tagName)
              && !node.textContent.trim()
              && !node.querySelector('a, strong, em')) {
              node.remove();
              return;
            }
            Array.from(node.childNodes).forEach(removeEmptyNodes);
          }
        };
        removeEmptyNodes(doc.body);
        content = doc.body.innerHTML.trim().replace(/\n\s*\n/g, '\n').replace(/\s+$/gm, '');
      } else {
        content = content.trim().replace(/\n\s*\n/g, '\n').replace(/\s+$/gm, '');
      }

      const commitAfterCopy = () => {
        // Bỏ lệnh kiểm tra, LUÔN LUÔN lưu lịch sử lên Google Sheets cho TẤT CẢ website (bao gồm cả Shopee)
        const pkey = copyButton.dataset.productKey;
        const desc = copyButton.dataset.descHtml;
        if (pkey && desc) kgCommitDesc(pkey, website, desc); // Gọi hàm lưu lên Sheets
        
        // Gọi thông báo đẹp thay vì dùng alert
        hienThongBao('✅ Đã sao chép nội dung thành công!');
        copyButton.style.display = 'none';
      };

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(content)
          .then(commitAfterCopy)
          .catch(err => {
            console.error('Lỗi sao chép clipboard:', err);
            if (fallbackCopy(content)) commitAfterCopy();
          });
      } else {
        if (fallbackCopy(content)) commitAfterCopy();
      }
    }

    function fallbackCopy(text) {
      const textArea = document.createElement('textarea');
      textArea.value = text;
      textArea.style.position = 'fixed';
      textArea.style.opacity = '0';
      document.body.appendChild(textArea);
      textArea.focus();
      textArea.select();

      try {
        const ok = document.execCommand('copy');
        if (!ok) alert('Không thể sao chép! Vui lòng thử lại hoặc sao chép thủ công.');
        return ok;
      } catch (err) {
        console.error('Lỗi sao chép dự phòng:', err);
        alert('Không thể sao chép! Vui lòng thử lại hoặc sao chép thủ công.');
        return false;
      } finally {
        document.body.removeChild(textArea);
      }
    }

    async function xuLyDangNhap() {
      const user = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('btnLogin');

        errorMsg.style.display = 'block';
        return;
      }

      btn.innerText = "Đang kiểm tra...";
      errorMsg.style.display = 'none';
      
      try {
        const response = await fetch(API_BASE + `?action=login&user=${encodeURIComponent(user)}&pass=${encodeURIComponent(pass)}`);
        const data = await response.json();

        if (data.status === "success") {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('main-app').style.display = 'block';
          
          // NÂNG CẤP: Lưu trạng thái đăng nhập gắn với NGÀY HÔM NAY
          const homNay = new Date().toDateString();
          localStorage.setItem('kg_login_date', homNay);
          localStorage.setItem('kg_login_name', data.name);
          
          alert('Xin chào: ' + data.name);
        } else {
          errorMsg.innerText = "Sai tài khoản hoặc mật khẩu!";
          errorMsg.style.display = 'block';
          btn.innerText = "Đăng nhập";
        }
      } catch (err) {
        console.error("Lỗi đăng nhập:", err);
        errorMsg.innerText = "Lỗi hệ thống! Vui lòng báo quản lý kiểm tra lại link API.";
        errorMsg.style.display = 'block';
        btn.innerText = "Đăng nhập";
      }
    }

    // NÂNG CẤP: Tự động mở khóa nếu ngày lưu trữ trùng với NGÀY HÔM NAY
    const homNay = new Date().toDateString();
